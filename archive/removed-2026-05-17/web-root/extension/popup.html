<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelion</title>
  <style>
    body { margin: 0; width: 380px; height: 540px; font-family: system-ui, sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
    .header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1f1f2e; }
    .logo { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #3b82f6); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
    .title { font-weight: 700; font-size: 15px; letter-spacing: 0.3px; }
    .frame { width: 100%; height: calc(100% - 57px); border: none; }
    .fallback { padding: 20px; text-align: center; }
    .fallback a { display: inline-block; margin-top: 12px; background: #2563eb; color: #fff; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">K</div>
    <div class="title">Kelion AI</div>
  </div>
  <iframe id="frame" class="frame" src="https://kelionai.app/?kelion_nested=1" allow="camera; microphone; geolocation; fullscreen"></iframe>
  <script src="popup.js"></script>
</body>
</html>
