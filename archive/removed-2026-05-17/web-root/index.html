<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KelionAI — Your Intelligent Voice AI Assistant</title>
    <meta name="description" content="KelionAI is an intelligent, empathetic AI assistant with real-time voice chat, 3D avatars, and multi-language support. Try the free 15-minute demo." />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- PWA manifest so users can "Install Kelion" on their home screen
         (iOS Safari / Android Chrome / desktop Chrome). Avoids App Store /
         Play Store fees per the approved Stage 7 monetization plan. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Chrome 125+ deprecated the apple-prefixed meta; include the
         standard one first and keep the apple-prefixed one for iOS
         Safari backwards-compat. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kelion" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="KelionAI — Your Intelligent Voice AI Assistant" />
    <meta property="og:description" content="Speak naturally in any language. KelionAI understands, responds and helps you in real time with 3D avatars and advanced AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kelionai.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KelionAI — Your Intelligent Voice AI Assistant" />
    <meta name="twitter:description" content="Speak naturally in any language. KelionAI understands, responds and helps you in real time with 3D avatars and advanced AI." />

    <!-- SEO extras -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kelionai.app" />
    <meta name="author" content="KelionAI" />
    <meta name="keywords" content="AI assistant, voice chat, 3D avatar, multilingual AI, real-time AI, Kelion, voice AI, conversational AI" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KelionAI",
      "url": "https://kelionai.app",
      "description": "Real-time AI voice companion with 3D avatar and persistent memory. Speak naturally in any language.",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP",
        "description": "Free 15-minute trial, then pay-as-you-go credits"
      },
      "creator": {
        "@type": "Organization",
        "name": "KelionAI",
        "url": "https://kelionai.app"
      }
    }
    </script>

    <!-- Preload critical font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  </head>
  <body>
    <div id="root">
      <h1 id="kelion-loading" style="color: white; text-align: center; margin-top: 20%; font-family: sans-serif;">KelionAI Loading...</h1>
    </div>
    <script>
      // Fallback: if React does not mount within 10s, show an error message.
      setTimeout(function() {
        var root = document.getElementById('root');
        var loading = document.getElementById('kelion-loading');
        if (root && root.children.length <= 1 && loading) {
          loading.innerText = 'KelionAI — Eroare la încărcare. Reîmprospătează pagina.';
          loading.style.color = '#ff6b6b';
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
