<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelionAI — Admin Panel</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="admin-container">

        <!-- HEADER -->
        <header class="admin-header">
            <div class="header-left">
                <a href="/" class="back-link" id="btn-back">← Back</a>
                <span class="admin-logo">🛡️ KelionAI</span>
                <span class="admin-badge">ADMIN</span>
            </div>
            <div class="header-right">
                <span id="admin-uptime" class="admin-uptime">—</span>
                <button class="admin-btn" onclick="location.reload()">🔄 Refresh</button>
                <button class="admin-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </header>

        <!-- STATS BAR (real data from API) -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="val-users">—</div>
                <div class="stat-label">Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👁️</div>
                <div class="stat-value" id="val-views">—</div>
                <div class="stat-label">Vizite Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="val-cost-today">—</div>
                <div class="stat-label">Cost Azi</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💳</div>
                <div class="stat-value" id="val-cost-month">—</div>
                <div class="stat-label">Cost Lună</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-value" id="val-active">—</div>
                <div class="stat-label">Acum Online</div>
            </div>
        </div>

        <!-- MAIN VIEW: 7 BUTTONS -->
        <div id="view-buttons" class="buttons-grid">
            <button class="nav-banner" onclick="openSection('ai')" style="--accent: #7c3aed; --accent2: #a78bfa;">
                <div class="banner-icon">🤖</div>
                <div class="banner-text">
                    <div class="banner-title">AI Credits & Costs</div>
                    <div class="banner-sub">Providers, consum, credite</div>
                </div>
                <div class="banner-stat" id="preview-ai">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <button class="nav-banner" onclick="openSection('brain')" style="--accent: #10b981; --accent2: #34d399;">
                <div class="banner-icon">🧠</div>
                <div class="banner-text">
                    <div class="banner-title">Brain & Health</div>
                    <div class="banner-sub">Status, tools, providers, errors</div>
                </div>
                <div class="banner-stat" id="preview-brain">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <button class="nav-banner" onclick="openSection('traffic')" style="--accent: #06b6d4; --accent2: #22d3ee;">
                <div class="banner-icon">🌐</div>
                <div class="banner-text">
                    <div class="banner-title">Trafic</div>
                    <div class="banner-sub">Vizite, IP, browser, țară, referrer</div>
                </div>
                <div class="banner-stat" id="preview-traffic">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <button class="nav-banner" onclick="openSection('live')" style="--accent: #22c55e; --accent2: #4ade80;">
                <div class="banner-icon">👥</div>
                <div class="banner-text">
                    <div class="banner-title">Live — Acum pe site</div>
                    <div class="banner-sub">Sesiuni active în timp real</div>
                </div>
                <div class="banner-stat" id="preview-live">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <button class="nav-banner" onclick="openSection('users')" style="--accent: #f59e0b; --accent2: #fbbf24;">
                <div class="banner-icon">👤</div>
                <div class="banner-text">
                    <div class="banner-title">Users & Revenue</div>
                    <div class="banner-sub">Useri, abonamente, plăți</div>
                </div>
                <div class="banner-stat" id="preview-users">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <button class="nav-banner" onclick="openSection('memories')" style="--accent: #ec4899; --accent2: #f472b6;">
                <div class="banner-icon">💾</div>
                <div class="banner-text">
                    <div class="banner-title">Memories</div>
                    <div class="banner-sub">Ce a învățat K1</div>
                </div>
                <div class="banner-stat" id="preview-memories">—</div>
                <div class="banner-arrow">›</div>
            </button>

            <a href="/admin/brain-chat.html" class="nav-banner" style="--accent: #8b5cf6; --accent2: #c084fc; text-decoration: none;">
                <div class="banner-icon">💬</div>
                <div class="banner-text">
                    <div class="banner-title">K1 Chat</div>
                    <div class="banner-sub">Canal direct cu creierul</div>
                </div>
                <div class="banner-stat">→</div>
                <div class="banner-arrow">›</div>
            </a>
        </div>

        <!-- SUB-PAGE CONTENT AREA (hidden by default) -->
        <div id="view-section" class="section-view" style="display:none;">
            <button class="back-section-btn" onclick="closeSection()">← Înapoi la meniu</button>
            <h2 id="section-title"></h2>
            <div id="section-content"></div>
        </div>

    </div>

    <script>
    /* Theme Toggle */
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('admin-theme', isLight ? 'light' : 'dark');
        document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
    }
    if (localStorage.getItem('admin-theme') === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('theme-toggle').textContent = '☀️';
    }

    /* Back button - go to previous page */
    document.getElementById('btn-back').addEventListener('click', function(e) {
        e.preventDefault();
        if (document.referrer && document.referrer.includes(location.hostname)) {
            history.back();
        } else {
            location.href = '/';
        }
    });
    </script>
    <script src="/admin/admin-app.js?v=20260320"></script>
</body>
</html>
