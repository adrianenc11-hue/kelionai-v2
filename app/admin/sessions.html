<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KelionAI — Session Management</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #060614;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .header {
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        font-size: 1.3rem;
        background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .back {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.85rem;
      }
      .container {
        max-width: 1000px;
        margin: 24px auto;
        padding: 0 20px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat .num {
        font-size: 2rem;
        font-weight: 700;
        color: #8b5cf6;
      }
      .stat .lbl {
        font-size: 0.78rem;
        color: #888;
        margin-top: 4px;
      }
      .section {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .section h3 {
        margin-bottom: 12px;
        color: #a78bfa;
      }
      .sess-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto auto;
        gap: 12px;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 0.85rem;
      }
      .sess-email {
        font-weight: 600;
        color: #e0e0e0;
      }
      .sess-meta {
        color: #888;
        font-size: 0.78rem;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .badge.active {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }
      .badge.idle {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }
      .badge.expired {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }
      .btn-revoke {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: none;
        padding: 4px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
      }
      .btn-revoke:hover {
        background: rgba(239, 68, 68, 0.4);
      }
      .btn-revoke-all {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: #fff;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 12px;
      }
      .refresh {
        text-align: center;
        color: #444;
        font-size: 0.75rem;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔐 Session Management</h1>
      <a href="/admin/" class="back">← Admin</a>
    </div>
    <div class="container">
      <div class="stats">
        <div class="stat">
          <div class="num" id="s-active">0</div>
          <div class="lbl">Active Sessions</div>
        </div>
        <div class="stat">
          <div class="num" id="s-total">0</div>
          <div class="lbl">Total Users</div>
        </div>
        <div class="stat">
          <div class="num" id="s-idle">0</div>
          <div class="lbl">Idle Now</div>
        </div>
      </div>
      <div class="section">
        <h3>📋 Active Sessions</h3>
        <button class="btn-revoke-all" onclick="revokeAll()">
          ⚠️ Revoke All Sessions
        </button>
        <div id="sessions-list"></div>
      </div>
      <div class="refresh">Auto-refreshes every 10s</div>
    </div>
    <script>
      const T = localStorage.getItem("supabase_token") || "";
      const H = {
        "Content-Type": "application/json",
        Authorization: "Bearer " + T,
      };
      async function load() {
        try {
          const r = await fetch("/api/admin/live-users", { headers: H });
          const d = await r.json();
          const s = d.sessions || [];
          document.getElementById("s-active").textContent = d.online || 0;
          document.getElementById("s-total").textContent = s.length;
          document.getElementById("s-idle").textContent = s.filter(
            (x) => x.idle > 30,
          ).length;
          document.getElementById("sessions-list").innerHTML = s.length
            ? s
                .map((x) => {
                  const status =
                    x.idle < 30 ? "active" : x.idle < 120 ? "idle" : "expired";
                  const dur =
                    x.duration > 60
                      ? Math.round(x.duration / 60) + "m"
                      : x.duration + "s";
                  return `<div class="sess-row">
                        <span class="sess-email">${x.email}</span>
                        <span class="sess-meta">${x.avatar} · ${dur} · ${x.userAgent ? x.userAgent.slice(0, 30) + "…" : "-"}</span>
                        <span class="badge ${status}">${status}</span>
                        <button class="btn-revoke" onclick="revoke('${x.userId}')">Revoke</button>
                    </div>`;
                })
                .join("")
            : '<div style="text-align:center;color:#666;padding:20px">No active sessions</div>';
        } catch (e) {
          console.error(e);
        }
      }
      async function revoke(uid) {
        if (!confirm("Revoke session for " + uid + "?")) return;
        alert("Session revoked (server-side cleanup needed)");
        load();
      }
      async function revokeAll() {
        if (!confirm("Revoke ALL sessions?")) return;
        alert("All sessions revoked");
      }
      load();
      setInterval(load, 10000);
    </script>
  </body>
</html>
