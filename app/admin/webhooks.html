<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KelionAI — Webhooks & Rate Limits</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #060614;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .header {
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        font-size: 1.3rem;
        background: linear-gradient(135deg, #06b6d4, #22c55e);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .back {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.85rem;
      }
      .container {
        max-width: 1000px;
        margin: 24px auto;
        padding: 0 20px;
      }
      .section {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .section h3 {
        margin-bottom: 12px;
        color: #06b6d4;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat .num {
        font-size: 2rem;
        font-weight: 700;
        color: #06b6d4;
      }
      .stat .num.red {
        color: #ef4444;
      }
      .stat .lbl {
        font-size: 0.78rem;
        color: #888;
        margin-top: 4px;
      }
      .form {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .form input {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 12px;
        color: #fff;
        font-size: 0.85rem;
        flex: 1;
        min-width: 200px;
      }
      .form button {
        background: linear-gradient(135deg, #06b6d4, #22c55e);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .hook-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 0.85rem;
      }
      .hook-url {
        color: #06b6d4;
        font-weight: 500;
        word-break: break-all;
      }
      .hook-meta {
        color: #888;
        font-size: 0.75rem;
      }
      .btn-del {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: none;
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .rl-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 0.85rem;
      }
      .rl-key {
        color: #e0e0e0;
        font-weight: 500;
      }
      .rl-blocked {
        color: #ef4444;
        font-weight: 600;
      }
      .refresh {
        text-align: center;
        color: #444;
        font-size: 0.75rem;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔗 Webhooks & Rate Limits</h1>
      <a href="/admin/" class="back">← Admin</a>
    </div>
    <div class="container">
      <div class="stats">
        <div class="stat">
          <div class="num" id="s-hooks">0</div>
          <div class="lbl">Webhooks</div>
        </div>
        <div class="stat">
          <div class="num" id="s-tracked">0</div>
          <div class="lbl">Tracked Users</div>
        </div>
        <div class="stat">
          <div class="num red" id="s-blocked">0</div>
          <div class="lbl">Currently Blocked</div>
        </div>
      </div>
      <div class="section">
        <h3>🔗 Webhooks</h3>
        <div class="form">
          <input id="w-url" placeholder="https://your-endpoint.com/webhook" />
          <input id="w-secret" placeholder="Secret (optional)" style="max-width: 180px" />
          <button onclick="addHook()">+ Add Webhook</button>
        </div>
        <div id="hooks-list"></div>
      </div>
      <div class="section">
        <h3>🚦 Rate Limit Status</h3>
        <div id="rl-list"></div>
      </div>
      <div class="refresh">Auto-refreshes every 10s</div>
    </div>
    <script>
      const T = localStorage.getItem('supabase_token') || '';
      const H = { 'Content-Type': 'application/json', Authorization: 'Bearer ' + T };
      async function load() {
        try {
          const [hr, rr] = await Promise.all([
            fetch('/api/admin/webhooks', { headers: H }),
            fetch('/api/admin/rate-limits', { headers: H }),
          ]);
          const hooks = await hr.json(),
            rl = await rr.json();
          document.getElementById('s-hooks').textContent = hooks.length || 0;
          document.getElementById('s-tracked').textContent = rl.totalTracked || 0;
          document.getElementById('s-blocked').textContent = rl.currentlyBlocked || 0;
          document.getElementById('hooks-list').innerHTML =
            (hooks || [])
              .map(
                (h) =>
                  `<div class="hook-row"><div><span class="hook-url">${h.url}</span><div class="hook-meta">Events: ${h.events.join(', ')} · ${h.deliveries} deliveries${h.lastError ? ' · ⚠️ ' + h.lastError : ''}</div></div><button class="btn-del" onclick="delHook('${h.id}')">Delete</button></div>`
              )
              .join('') || '<div style="text-align:center;color:#666;padding:12px">No webhooks configured</div>';
          document.getElementById('rl-list').innerHTML =
            (rl.topUsers || [])
              .map(
                (u) =>
                  `<div class="rl-row"><span class="rl-key">${u.key}</span><span>${u.count} reqs${u.blocked ? ' · <span class="rl-blocked">BLOCKED (' + u.totalBlocks + 'x)</span>' : ''}</span></div>`
              )
              .join('') || '<div style="text-align:center;color:#666;padding:12px">No rate limit data</div>';
        } catch (e) {
          console.error(e);
        }
      }
      async function addHook() {
        await fetch('/api/admin/webhooks', {
          method: 'POST',
          headers: H,
          body: JSON.stringify({
            url: document.getElementById('w-url').value,
            secret: document.getElementById('w-secret').value,
          }),
        });
        load();
      }
      async function delHook(id) {
        await fetch('/api/admin/webhooks/' + id, { method: 'DELETE', headers: H });
        load();
      }
      load();
      setInterval(load, 10000);
    </script>
  </body>
</html>
