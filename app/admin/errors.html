<!doctype html>
<html lang="en">
  <head>
    <meta name="description" content="Page description" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KelionAI — Error Tracking</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #060614;
        color: #e0e0e0;
        min-height: 100vh;
      }
      .header {
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        font-size: 1.3rem;
        background: linear-gradient(135deg, #ef4444, #f59e0b);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .back {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        font-size: 0.85rem;
      }
      .container {
        max-width: 1000px;
        margin: 24px auto;
        padding: 0 20px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat .num {
        font-size: 2rem;
        font-weight: 700;
        color: #ef4444;
      }
      .stat .num.ok {
        color: #22c55e;
      }
      .stat .lbl {
        font-size: 0.78rem;
        color: #888;
        margin-top: 4px;
      }
      .section {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .section h3 {
        margin-bottom: 12px;
        color: #f87171;
      }
      .err-row {
        padding: 8px;
        border-left: 3px solid #ef4444;
        margin-bottom: 6px;
        border-radius: 4px;
        background: rgba(239, 68, 68, 0.05);
      }
      .err-row .msg {
        color: #fca5a5;
        font-size: 0.85rem;
        font-weight: 500;
      }
      .err-row .meta {
        color: #666;
        font-size: 0.75rem;
        margin-top: 2px;
      }
      .top-err {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 0.85rem;
      }
      .top-err .cnt {
        color: #ef4444;
        font-weight: 600;
      }
      .source-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .source-tag {
        padding: 4px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 0.8rem;
      }
      .refresh {
        text-align: center;
        color: #444;
        font-size: 0.75rem;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🚨 Error Tracking</h1>
      <a href="/admin/" class="back">← Admin</a>
    </div>
    <div class="container">
      <div class="stats">
        <div class="stat">
          <div class="num" id="s-total">0</div>
          <div class="lbl">Total Errors</div>
        </div>
        <div class="stat">
          <div class="num" id="s-1h">0</div>
          <div class="lbl">Last 1 Hour</div>
        </div>
        <div class="stat">
          <div class="num" id="s-24h">0</div>
          <div class="lbl">Last 24 Hours</div>
        </div>
      </div>
      <div class="section">
        <h3>🔥 Top Errors (by frequency)</h3>
        <div id="top-list"></div>
      </div>
      <div class="section">
        <h3>📊 By Source</h3>
        <div id="source-list" class="source-bar"></div>
      </div>
      <div class="section">
        <h3>📋 Recent Errors</h3>
        <div id="err-list"></div>
      </div>
      <div class="refresh">Auto-refreshes every 15s</div>
    </div>
    <script>
      const T = localStorage.getItem('supabase_token') || '';
      const H = {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + T,
      };
      async function load() {
        try {
          const r = await fetch('/api/admin/errors', { headers: H });
          const d = await r.json();
          document.getElementById('s-total').textContent = d.total || 0;
          document.getElementById('s-1h').textContent = d.last1h || 0;
          document.getElementById('s-24h').textContent = d.last24h || 0;
          if (d.total === 0) document.getElementById('s-total').classList.add('ok');
          const topList = document.getElementById('top-list');
          const topErrorsHtml = (d.topErrors || [])
            .map((e) => `<div class="top-err"><span>${e.message}</span><span class="cnt">×${e.count}</span></div>`)
            .join('') || '<div style="text-align:center;color:#666;padding:12px">No errors 🎉</div>';
          topList.textContent = '';
          topList.insertAdjacentHTML('afterbegin', topErrorsHtml);
          const src = d.bySource || {};
          const sourceList = document.getElementById('source-list');
          const sourceHtml = Object.entries(src)
            .map(([k, v]) => `<span class="source-tag">${k}: <strong>${v}</strong></span>`)
            .join('') || 'None';
          sourceList.textContent = '';
          sourceList.insertAdjacentHTML('afterbegin', sourceHtml);
          const errList = document.getElementById('err-list');
          const errHtml = (d.recent || [])
            .slice(0, 20)
            .map(
              (e) =>
                `<div class="err-row"><div class="msg">${e.message}</div><div class="meta">${e.source} · ${e.route || '-'} · ${new Date(e.timestamp).toLocaleTimeString()}</div>${e.stack ? `<pre style="color:#666;font-size:.7rem;margin-top:4px;white-space:pre-wrap;max-height:60px;overflow:hidden">${e.stack.slice(0, 200)}</pre>` : ''}</div>`
            )
            .join('') || '<div style="text-align:center;color:#22c55e;padding:20px">No errors! System healthy 🎉</div>';
          errList.textContent = '';
          errList.insertAdjacentHTML('afterbegin', errHtml);
        } catch (e) {
          console.error(e);
        }
      }
      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
