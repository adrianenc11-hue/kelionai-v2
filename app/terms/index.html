<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terms of Service — KelionAI</title>
    <meta
      name="description"
      content="KelionAI Terms of Service. Read about your rights and obligations when using our platform."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/styles/design-system.css" />
    <link rel="stylesheet" href="/styles/mobile.css" />
    <style>
      body {
        background: var(--kelion-bg, #050510);
        color: var(--kelion-text, #f0f0ff);
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .legal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 40px;
        border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      }

      .legal-logo {
        text-decoration: none;
        font-size: 1.4rem;
        font-weight: 800;
        color: #f0f0ff;
      }

      .legal-logo span {
        background: linear-gradient(135deg, #6366f1, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .legal-nav {
        display: flex;
        gap: 24px;
      }

      .legal-nav a {
        color: #8888aa;
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.2s;
      }

      .legal-nav a:hover {
        color: #f0f0ff;
      }

      .legal-main {
        max-width: 800px;
        margin: 0 auto;
        padding: 60px 24px 80px;
      }

      .legal-main h1 {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #6366f1, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .legal-meta {
        color: #555577;
        font-size: 0.85rem;
        margin-bottom: 40px;
      }

      .legal-section {
        margin-bottom: 32px;
      }

      .legal-section h2 {
        font-size: 1.15rem;
        font-weight: 700;
        color: #a5b4fc;
        margin-bottom: 12px;
      }

      .legal-section p {
        color: #b0b0cc;
        line-height: 1.7;
        font-size: 0.95rem;
      }

      .legal-loading {
        text-align: center;
        color: #555577;
        padding: 60px 0;
        font-size: 0.95rem;
      }

      .legal-footer {
        text-align: center;
        padding: 32px;
        border-top: 1px solid rgba(99, 102, 241, 0.1);
        color: #555577;
        font-size: 0.82rem;
      }

      .legal-footer a {
        color: #6366f1;
        text-decoration: none;
        margin: 0 8px;
      }

      .legal-footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        .legal-header {
          padding: 16px 20px;
        }

        .legal-main {
          padding: 32px 16px 60px;
        }

        .legal-main h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <header class="legal-header">
      <a href="/" class="legal-logo">Kelion<span>AI</span></a>
      <nav role="navigation" class="legal-nav">
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/privacy/">Privacy</a>
        <a href="/gdpr/">GDPR</a>
      </nav>
    </header>

    <main class="legal-main">
      <h1>Terms of Service</h1>
      <p class="legal-meta">Effective date: March 1, 2026 · Version 1.0</p>
      <div id="legal-content">
        <div class="legal-loading">Loading terms of service...</div>
      </div>
    </main>

    <footer class="legal-footer">
      <p>
        © 2026 KelionAI. <a href="/terms/">Terms of Service</a> · <a href="/privacy/">Privacy Policy</a> ·
        <a href="/gdpr/">GDPR</a>
      </p>
    </footer>

    <script src="/terms/terms.js"></script>
    <a href="/" id="home-btn-fixed" class="home-btn-fixed" title="Home">🏠</a>
  </body>
</html>
