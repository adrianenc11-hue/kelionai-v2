<!DOCTYPE html>
<html>

<head>
    <title>Model Viewer</title>
    <script
        type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"}}</script>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px
        }

        .card {
            flex: 1;
            min-width: 300px;
            max-width: 50%;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden
        }

        .card h3 {
            text-align: center;
            margin: 8px;
            font-size: 14px
        }

        canvas {
            width: 100% !important;
            height: 350px !important;
            display: block
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>k-male-live.glb (19.9MB) — de pe PRODUCȚIE</h3>
        <div id="v1"></div>
    </div>
    <div class="card">
        <h3>k-male-backup.glb (30.6MB) — BACKUP original</h3>
        <div id="v2"></div>
    </div>
    <div class="card">
        <h3>test-avaturn.glb (13.2MB)</h3>
        <div id="v3"></div>
    </div>
    <div class="card">
        <h3>test-mpfb.glb (35.1MB)</h3>
        <div id="v4"></div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        function setup(containerId, modelPath) {
            const container = document.getElementById(containerId);
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            const camera = new THREE.PerspectiveCamera(30, container.clientWidth / 350, 0.1, 100);
            camera.position.set(0, 1.5, 1.5);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, 350);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dl = new THREE.DirectionalLight(0xffffff, 1);
            dl.position.set(1, 2, 2);
            scene.add(dl);
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.4, 0);
            controls.update();
            new GLTFLoader().load('/models/' + modelPath, (gltf) => {
                scene.add(gltf.scene);
                const box = new THREE.Box3().setFromObject(gltf.scene);
                const center = box.getCenter(new THREE.Vector3());
                camera.position.set(center.x, center.y + 0.2, center.z + 0.8);
                controls.target.copy(center);
                controls.target.y += 0.15;
                controls.update();
            }, undefined, (e) => { container.innerHTML += '<p style="color:red">Error: ' + e.message + '</p>'; });
            (function animate() { requestAnimationFrame(animate); renderer.render(scene, camera) })();
        }
        setup('v1', 'k-male-live.glb');
        setup('v2', 'k-male-backup.glb');
        setup('v3', 'test-avaturn.glb');
        setup('v4', 'test-mpfb.glb');
    </script>
</body>

</html>
