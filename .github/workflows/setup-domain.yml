name: Setup Domain on Railway

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add kelionai.app to Railway
        run: |
          TOKEN="f2eb5a87-ed09-4ca6-bc07-956b9a307523"
          SERVICE_ID="e983c608-8711-4f7e-8e97-774899602d44"
          ENV_ID="0e862a09-e329-4d2a-9e80-ecf902fb368b"

          mkdir -p logs

          echo "=== Add kelionai.app ===" | tee logs/domain.txt
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { customDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", domain: \\\"kelionai.app\\\" }) { id domain cnameTarget } }\"}" \
            | python3 -m json.tool 2>/dev/null | tee -a logs/domain.txt

          echo "" | tee -a logs/domain.txt
          echo "=== Service domains ===" | tee -a logs/domain.txt
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ service(id: \\\"$SERVICE_ID\\\") { domains { edges { node { id domain ... on CustomDomain { cnameTarget } } } } } }\"}" \
            | python3 -m json.tool 2>/dev/null | tee -a logs/domain.txt

      - name: Commit DNS result
        run: |
          git config user.email "ci@kelionai.app"
          git config user.name "KelionAI CI"
          git pull origin master --rebase
          git add logs/domain.txt
          git diff --staged --quiet || git commit -m "ci: Railway domain DNS info"
          git push https://x-access-token:${{ github.token }}@github.com/adrianenc11-hue/kelionai-v2.git master
