name: Setup Domain on Railway

on:
  push:
    branches: [master]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Add kelionai.app to Railway + get DNS target
        run: |
          TOKEN="f2eb5a87-ed09-4ca6-bc07-956b9a307523"
          SERVICE_ID="e983c608-8711-4f7e-8e97-774899602d44"
          ENV_ID="0e862a09-e329-4d2a-9e80-ecf902fb368b"

          echo "=== Adding custom domain kelionai.app ==="
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { customDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", domain: \\\"kelionai.app\\\" }) { id domain cnameTarget } }\"}")
          echo "$RESULT"

          echo ""
          echo "=== Also adding www.kelionai.app ==="
          RESULT2=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { customDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", domain: \\\"www.kelionai.app\\\" }) { id domain cnameTarget } }\"}")
          echo "$RESULT2"

          echo ""
          echo "=== Current service domains ==="
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ service(id: \\\"$SERVICE_ID\\\") { id name domains { edges { node { id domain ... on CustomDomain { cnameTarget } } } } } }\"}" \
            | python3 -m json.tool
