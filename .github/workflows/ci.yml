name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Backend unit tests ─────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: cd server && npm install
      - name: Run tests
        run: cd server && npm test

  # ── 2. Frontend build check ───────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build

  # ── 3. E2E tests against live ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (live)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npx playwright test --reporter=list,json
        env:
          BASE_URL: https://kelionai.app
        continue-on-error: true
      - name: Print summary
        if: always()
        run: |
          echo "========================================"
          echo "E2E RESULTS — kelionai.app"
          echo "========================================"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('e2e-results.json')) { console.log('No results — site unreachable or tests not run'); process.exit(0); }
            const r = JSON.parse(fs.readFileSync('e2e-results.json','utf8'));
            let passed=0, failed=0;
            const errors = [];
            function walk(s) {
              (s.suites||[]).forEach(walk);
              (s.specs||[]).forEach(spec => {
                (spec.tests||[]).forEach(t => {
                  const st = t.results?.[0]?.status;
                  if (st==='passed') passed++;
                  else if (st==='failed') {
                    failed++;
                    errors.push({ title: spec.title, err: (t.results?.[0]?.error?.message||'').split('\n')[0] });
                  }
                });
              });
            }
            (r.suites||[]).forEach(walk);
            console.log('PASSED : '+passed);
            console.log('FAILED : '+failed);
            console.log('TOTAL  : '+(passed+failed));
            if (errors.length) {
              console.log('');
              console.log('FAILED TESTS:');
              errors.forEach((e,i) => console.log((i+1)+'. '+e.title+'\n   '+e.err));
            } else if (passed > 0) {
              console.log('All tests passed!');
            }
          "
          echo "========================================"
      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7
