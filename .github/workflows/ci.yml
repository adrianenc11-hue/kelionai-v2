name: CI + Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm install
      - run: cd server && npm test

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @railway/cli

      - name: Deploy and log
        run: |
          mkdir -p logs
          LOG="logs/deploy-$(date +%Y%m%d-%H%M%S).txt"

          echo "Railway CLI version:" | tee $LOG
          railway --version 2>&1 | tee -a $LOG

          echo "=== railway up ===" | tee -a $LOG
          railway up --detach 2>&1 | tee -a $LOG

          echo "=== health ===" | tee -a $LOG
          sleep 30
          curl -s https://kelionai-v2-production.up.railway.app/health 2>&1 | tee -a $LOG
        env:
          RAILWAY_TOKEN: f2eb5a87-ed09-4ca6-bc07-956b9a307523
          RAILWAY_SERVICE_ID: e983c608-8711-4f7e-8e97-774899602d44

      - name: Commit logs
        run: |
          git config user.email "ci@kelionai.app"
          git config user.name "KelionAI CI"
          git pull origin master --rebase
          git add logs/
          git diff --staged --quiet || git commit -m "ci: deploy log $(date +%Y%m%d-%H%M%S)"
          git push https://x-access-token:${{ github.token }}@github.com/adrianenc11-hue/kelionai-v2.git master

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --reporter=list,json
        env:
          BASE_URL: https://kelionai-v2-production.up.railway.app
        continue-on-error: true
      - name: Summary
        if: always()
        run: |
          node -e "
            const fs=require('fs');
            if(!fs.existsSync('e2e-results.json')){console.log('No results');process.exit(0);}
            const r=JSON.parse(fs.readFileSync('e2e-results.json','utf8'));
            let p=0,f=0,errs=[];
            function walk(s){(s.suites||[]).forEach(walk);(s.specs||[]).forEach(sp=>{(sp.tests||[]).forEach(t=>{const st=t.results?.[0]?.status;if(st==='passed')p++;else if(st==='failed'){f++;errs.push(sp.title+': '+(t.results?.[0]?.error?.message||'').split('\n')[0]);}});})}
            (r.suites||[]).forEach(walk);
            console.log('PASSED:',p,'FAILED:',f,'TOTAL:',(p+f));
            if(errs.length)errs.forEach((e,i)=>console.log((i+1)+'.'+e));
            else if(p>0)console.log('All tests passed!');
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7
