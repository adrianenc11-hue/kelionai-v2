name: CI + Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  RAILWAY_TOKEN: d5c7c777-ef06-45b9-8c11-eb2a1b7e9367
  RAILWAY_PROJECT_ID: b2a7f85e-7065-42c6-9922-82f5d2b01ebe
  RAILWAY_SERVICE_ID: e983c608-8711-4f7e-8e97-774899602d44

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm install
      - run: cd server && npm test

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: |
          railway up \
            --service $RAILWAY_SERVICE_ID \
            --detach
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}

      - name: Wait and verify
        run: |
          echo "Waiting 90s for deploy to complete..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://kelionai-v2-production.up.railway.app/health)
          echo "Health check: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Deploy successful — service is live!"
          else
            echo "Warning: health check returned $STATUS"
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --reporter=list,json
        env:
          BASE_URL: https://kelionai-v2-production.up.railway.app
        continue-on-error: true
      - name: Summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('e2e-results.json')) { console.log('No results'); process.exit(0); }
            const r = JSON.parse(fs.readFileSync('e2e-results.json','utf8'));
            let p=0,f=0,errs=[];
            function walk(s){
              (s.suites||[]).forEach(walk);
              (s.specs||[]).forEach(sp=>{
                (sp.tests||[]).forEach(t=>{
                  const st=t.results?.[0]?.status;
                  if(st==='passed')p++;
                  else if(st==='failed'){
                    f++;
                    errs.push(sp.title+': '+(t.results?.[0]?.error?.message||'').split('\n')[0]);
                  }
                });
              });
            }
            (r.suites||[]).forEach(walk);
            console.log('PASSED:',p,' FAILED:',f,' TOTAL:',(p+f));
            if(errs.length){console.log('');errs.forEach((e,i)=>console.log((i+1)+'. '+e));}
            else if(p>0) console.log('All tests passed!');
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7
