name: acceptance

# Runs the acceptance criteria in e2e/acceptance/ against the live production
# URL. A feature is considered delivered ONLY when its script exits 0.
#
# This workflow is informational on PRs (so broken features do not block
# unrelated changes) but tracked on master so the real status is always
# visible.
#
# IMPORTANT: this workflow does NOT define the acceptance — the scripts do.
# It just runs them. Weakening a script to make it pass is forbidden by
# RULES.md and by CODEOWNERS on e2e/acceptance/.

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      ACCEPTANCE_BASE: https://kelionai.app
    strategy:
      fail-fast: false
      matrix:
        capability:
          # Kelion scope: a voice-first avatar. Legacy capabilities
          # (payments, language-mirror, language-switch, trial-timer,
          # logout-media) were removed from the product surface in
          # Stage 1 and their acceptance scripts were dropped with
          # them — see DELIVERY_CONTRACT.md § "Out of scope".
          - voice-roundtrip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sync gate — wait until Railway has finished rolling out the
      # commit that triggered this workflow. Without this, CI on master
      # races the Railway webhook and routinely turns red against the
      # previous production image even though the new one is about to
      # land. The /health endpoint exposes `deploy_sha` (populated from
      # RAILWAY_GIT_COMMIT_SHA); we poll for up to 8 minutes for it to
      # match ${{ github.sha }} before running the acceptance script.
      # On PRs (where github.sha is a merge-commit SHA that never
      # reaches Railway) the gate is skipped.
      - name: Wait for Railway deploy of this commit
        if: github.event_name == 'push'
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for $ACCEPTANCE_BASE/health to report deploy_sha=$EXPECTED_SHA"
          DEADLINE=$(( $(date +%s) + 480 ))  # 8 minutes
          while :; do
            RESP=$(curl -fsS --max-time 15 "$ACCEPTANCE_BASE/health" || echo '{}')
            LIVE_SHA=$(printf '%s' "$RESP" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).deploy_sha||'')}catch{console.log('')}})")
            if [ -n "$LIVE_SHA" ] && [ "$LIVE_SHA" = "$EXPECTED_SHA" ]; then
              echo "deploy_sha matches ($LIVE_SHA) — proceeding"
              break
            fi
            if [ "$LIVE_SHA" = "unknown" ]; then
              echo "Production does not expose deploy_sha yet (pre-sync-gate build). Proceeding without matching."
              break
            fi
            NOW=$(date +%s)
            if [ "$NOW" -ge "$DEADLINE" ]; then
              echo "Timeout waiting for Railway redeploy of $EXPECTED_SHA (last seen live_sha=$LIVE_SHA)"
              exit 1
            fi
            echo "  live_sha=${LIVE_SHA:-<empty>} — sleeping 15s"
            sleep 15
          done

      - name: Run acceptance — ${{ matrix.capability }}
        run: |
          echo "Running e2e/acceptance/${{ matrix.capability }}.cjs against $ACCEPTANCE_BASE"
          node e2e/acceptance/${{ matrix.capability }}.cjs
