name: acceptance

# Runs the acceptance criteria in e2e/acceptance/ against the live production
# URL. A feature is considered delivered ONLY when its script exits 0.
#
# This workflow is informational on PRs (so broken features do not block
# unrelated changes) but tracked on master so the real status is always
# visible.
#
# IMPORTANT: this workflow does NOT define the acceptance — the scripts do.
# It just runs them. Weakening a script to make it pass is forbidden by
# RULES.md and by CODEOWNERS on e2e/acceptance/.

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      ACCEPTANCE_BASE: https://kelionai.app
    strategy:
      fail-fast: false
      matrix:
        capability:
          # voice-roundtrip is the only real acceptance test still tied to a
          # live Kelion feature (Gemini Live ephemeral-token mint).
          - voice-roundtrip
          # The next five capabilities were deleted from the product in the
          # Kelion rebuild (see DELIVERY_CONTRACT.md § Out of scope). Their
          # scripts exist ONLY as out-of-scope stubs that exit 0 so the
          # GitHub branch protection rules, which still list these as
          # required, continue to receive a status report. RULES.md §2
          # compliance is handled inside the stubs: they print an explicit
          # "OUT OF SCOPE" banner on stdout and do NOT claim the feature
          # works.
          - payments
          - language-mirror
          - language-switch
          - trial-timer
          - logout-media
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run acceptance — ${{ matrix.capability }}
        run: |
          echo "Running e2e/acceptance/${{ matrix.capability }}.cjs against $ACCEPTANCE_BASE"
          node e2e/acceptance/${{ matrix.capability }}.cjs
