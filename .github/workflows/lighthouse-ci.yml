name: Lighthouse CI (Live)

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for Railway deploy to finish
        run: sleep 180

      - name: Verify live site is up
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://kelionai.app/ || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "✅ Site is live (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "❌ Site is DOWN after 3 retries — skipping Lighthouse"
          exit 1

      - name: Run Lighthouse CI against LIVE
        run: npx @lhci/cli@0.14.0 autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
