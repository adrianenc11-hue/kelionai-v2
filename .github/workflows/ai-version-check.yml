name: Weekly AI Version Auto-Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check latest Gemini models
        run: |
          GEMINI_KEY="${{ secrets.GOOGLE_AI_KEY }}"
          if [ -z "$GEMINI_KEY" ]; then
            echo "GEMINI_FLASH=gemini-2.5-flash" >> $GITHUB_ENV
            echo "GEMINI_PRO=gemini-2.5-pro" >> $GITHUB_ENV
            echo "No Gemini key set to defaults"
            exit 0
          fi
          MODELS=$(curl -sf "https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_KEY}" || echo '{}')
          FLASH=$(echo "$MODELS" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            try{const m=JSON.parse(d).models||[];const f=m.filter(x=>x.name.includes('flash')&&!x.name.includes('thinking')&&!x.name.includes('lite')&&!x.name.includes('8b')).map(x=>x.name.split('/').pop()).sort().pop();console.log(f||'gemini-2.5-flash');}catch{console.log('gemini-2.5-flash');}
          ")
          PRO=$(echo "$MODELS" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            try{const m=JSON.parse(d).models||[];const p=m.filter(x=>x.name.includes('-pro')&&!x.name.includes('vision')).map(x=>x.name.split('/').pop()).sort().pop();console.log(p||'gemini-2.5-pro');}catch{console.log('gemini-2.5-pro');}
          ")
          echo "GEMINI_FLASH=$FLASH" >> $GITHUB_ENV
          echo "GEMINI_PRO=$PRO" >> $GITHUB_ENV
          echo "Gemini Flash: $FLASH | Pro: $PRO"

      - name: Check latest OpenAI models
        run: |
          OPENAI_KEY="${{ secrets.OPENAI_API_KEY }}"
          if [ -z "$OPENAI_KEY" ]; then
            echo "OPENAI_LATEST=gpt-4o" >> $GITHUB_ENV
            exit 0
          fi
          MODELS=$(curl -sf "https://api.openai.com/v1/models" -H "Authorization: Bearer ${OPENAI_KEY}" || echo '{}')
          LATEST=$(echo "$MODELS" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            try{const m=JSON.parse(d).data||[];const g=m.filter(x=>x.id.startsWith('gpt-')&&!x.id.includes('instruct')&&!x.id.includes('audio')&&!x.id.includes('realtime')).map(x=>x.id).sort().pop();console.log(g||'gpt-4o');}catch{console.log('gpt-4o');}
          ")
          echo "OPENAI_LATEST=$LATEST" >> $GITHUB_ENV
          echo "OpenAI: $LATEST"

      - name: Check latest Claude models
        run: |
          ANTHROPIC_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          if [ -z "$ANTHROPIC_KEY" ]; then
            echo "CLAUDE_LATEST=claude-3-5-sonnet-20241022" >> $GITHUB_ENV
            exit 0
          fi
          MODELS=$(curl -sf "https://api.anthropic.com/v1/models" -H "x-api-key: ${ANTHROPIC_KEY}" -H "anthropic-version: 2023-06-01" || echo '{}')
          LATEST=$(echo "$MODELS" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            try{const m=JSON.parse(d).data||[];const c=m.filter(x=>x.id.includes('sonnet')||x.id.includes('opus')).map(x=>x.id).sort().pop();console.log(c||'claude-3-5-sonnet-20241022');}catch{console.log('claude-3-5-sonnet-20241022');}
          ")
          echo "CLAUDE_LATEST=$LATEST" >> $GITHUB_ENV
          echo "Claude: $LATEST"

      - name: Update models.js with latest versions
        run: |
          node -e "
            const fs = require('fs');
            const path = 'server/config/models.js';
            let content = fs.readFileSync(path, 'utf8');
            const original = content;
            const flash = process.env.GEMINI_FLASH || 'gemini-2.5-flash';
            const pro = process.env.GEMINI_PRO || 'gemini-2.5-pro';
            const openai = process.env.OPENAI_LATEST || 'gpt-4o';
            const claude = process.env.CLAUDE_LATEST || 'claude-3-5-sonnet-20241022';
            content = content.replace(/GEMINI_CHAT:\s*['\"]gemini-[\w.-]+['\"]/g, \`GEMINI_CHAT: '\${flash}'\`);
            content = content.replace(/GEMINI_PRO:\s*['\"]gemini-[\w.-]+['\"]/g, \`GEMINI_PRO: '\${pro}'\`);
            content = content.replace(/OPENAI_CHAT:\s*['\"]gpt-[\w.-]+['\"]/g, \`OPENAI_CHAT: '\${openai}'\`);
            content = content.replace(/CLAUDE:\s*['\"]claude-[\w.-]+['\"]/g, \`CLAUDE: '\${claude}'\`);
            if (content !== original) {
              fs.writeFileSync(path, content);
              console.log('UPDATED');
            } else {
              console.log('NO_CHANGE');
            }
          "

      - name: Check and commit changes
        id: commit
        run: |
          if git diff --quiet server/config/models.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "All models up to date"
          else
            git config user.name "KelionAI Auto-Updater"
            git config user.email "bot@kelionai.app"
            git add server/config/models.js
            git commit -m "chore: auto-update AI models [Gemini:${GEMINI_FLASH} OpenAI:${OPENAI_LATEST} Claude:${CLAUDE_LATEST}]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Committed and pushed new model versions"
          fi

      - name: Trigger Railway redeploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "Triggering Railway redeploy..."
          curl -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{"query":"mutation { serviceInstanceRedeploy(environmentId:\"production\", serviceId:\"kelionai\") }"}' \
            --fail-with-body || echo "Railway redeploy trigger attempted"
          echo "Railway will auto-deploy from the new commit"
