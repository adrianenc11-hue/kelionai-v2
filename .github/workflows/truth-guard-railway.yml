name: Truth Guard (Railway PR Preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  truth-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (lock only)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit/Integration tests
        run: npm run test:unit

      - name: Build validation
        run: npm run build

      - name: Security scan
        run: npm run security

      # --- Resolve Railway PR Preview URL by polling PR comments ---
      - name: Resolve Railway Preview URL
        id: preview
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Looking for Railway preview URL in PR #${PR_NUMBER} comments..."

          for i in $(seq 1 60); do
            json="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate)"
            url="$(echo "$json" | jq -r '.[].body' \
              | grep -Eo 'https://[a-zA-Z0-9.-]+(\.railway\.app|\.up\.railway\.app|\.railway\.dev)(/[^\s)]*)?' \
              | head -n 1 || true)"

            if [ -n "${url}" ]; then
              echo "Found preview URL: ${url}"
              echo "base_url=${url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Not found yet (attempt $i/60). Waiting 10s..."
            sleep 10
          done

          echo "WARNING: Could not find Railway preview URL. Running smoke/e2e against production."
          echo "base_url=https://kelionai.app" >> "$GITHUB_OUTPUT"

      - name: Smoke tests
        env:
          BASE_URL: ${{ steps.preview.outputs.base_url || 'https://kelionai.app' }}
          API_BASE_URL: ${{ steps.preview.outputs.base_url || 'https://kelionai.app' }}
        run: npm run smoke

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E (Playwright) on Railway preview
        env:
          BASE_URL: ${{ steps.preview.outputs.base_url || 'https://kelionai.app' }}
          API_BASE_URL: ${{ steps.preview.outputs.base_url || 'https://kelionai.app' }}
        run: npm run e2e

      - name: Generate gate_report.json
        if: always()
        env:
          BASE_URL: ${{ steps.preview.outputs.base_url || 'https://kelionai.app' }}
        run: |
          node -e "
            const fs=require('fs');
            const report={
              version: '1.0',
              commit: process.env.GITHUB_SHA,
              railway_preview_url: process.env.BASE_URL || null,
              status: '${{ job.status }}',
              timestamp: new Date().toISOString(),
              limitations: ['Lighthouse not run in CI (no headless Chrome)', 'Typecheck: N/A (JS-only project)']
            };
            fs.writeFileSync('gate_report.json', JSON.stringify(report,null,2));
          "
          echo "See GitHub Actions logs + uploaded artifacts." > file_err.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truth-guard-artifacts
          path: |
            gate_report.json
            file_err.txt
            playwright-report
            test-results
            coverage
