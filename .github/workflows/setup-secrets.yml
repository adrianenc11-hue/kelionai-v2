name: Setup Secrets (run once)

on:
  workflow_dispatch:
    inputs:
      github_token:
        description: 'GitHub Personal Access Token (repo+workflow scope)'
        required: true
      railway_token:
        description: 'Railway Token'
        required: true
      railway_project_id:
        description: 'Railway Project ID'
        required: true
      railway_service_id:
        description: 'Railway Service ID'
        required: true
      render_api_key:
        description: 'Render API Key'
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install cryptography
        run: pip install cryptography -q

      - name: Set all secrets
        env:
          GH_TOKEN: ${{ github.event.inputs.github_token }}
          RAILWAY_TOKEN_VAL: ${{ github.event.inputs.railway_token }}
          RAILWAY_PROJECT_VAL: ${{ github.event.inputs.railway_project_id }}
          RAILWAY_SERVICE_VAL: ${{ github.event.inputs.railway_service_id }}
          RENDER_KEY_VAL: ${{ github.event.inputs.render_api_key }}
        run: |
          python3 << 'PYEOF'
          import base64, json, os, urllib.request, urllib.error

          token = os.environ["GH_TOKEN"]
          repo  = "adrianenc11-hue/kelionai-v2"

          req = urllib.request.Request(
            f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
            headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req) as r:
            key_data = json.load(r)

          key_id  = key_data["key_id"]
          pub_key = key_data["key"]

          from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PublicKey, X25519PrivateKey
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.ciphers.aead import AESGCM
          import hashlib, secrets as sec

          def encrypt_secret(pub_key_b64, secret_value):
            pub_key_bytes = base64.b64decode(pub_key_b64)
            pub_key_obj   = X25519PublicKey.from_public_bytes(pub_key_bytes)
            priv_key      = X25519PrivateKey.generate()
            shared_key    = priv_key.exchange(pub_key_obj)
            pub_bytes     = priv_key.public_key().public_bytes(
              serialization.Encoding.Raw, serialization.PublicFormat.Raw)
            key = hashlib.sha256(shared_key).digest()[:32]
            nonce = sec.token_bytes(12)
            ciphertext = AESGCM(key).encrypt(nonce, secret_value.encode(), None)
            return base64.b64encode(pub_bytes + nonce + ciphertext).decode()

          def set_secret(name, value):
            if not value:
              return
            encrypted = encrypt_secret(pub_key, value)
            body = json.dumps({"encrypted_value": encrypted, "key_id": key_id}).encode()
            req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/secrets/{name}",
              data=body, method="PUT",
              headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/vnd.github+json",
                "Content-Type": "application/json"
              }
            )
            try:
              with urllib.request.urlopen(req) as r:
                print(f"OK {name}: {r.status}")
            except urllib.error.HTTPError as e:
              print(f"FAIL {name}: {e.status} {e.read().decode()}")

          set_secret("RAILWAY_TOKEN",      os.environ.get("RAILWAY_TOKEN_VAL"))
          set_secret("RAILWAY_PROJECT_ID", os.environ.get("RAILWAY_PROJECT_VAL"))
          set_secret("RAILWAY_SERVICE_ID", os.environ.get("RAILWAY_SERVICE_VAL"))
          set_secret("RENDER_API_KEY",     os.environ.get("RENDER_KEY_VAL"))
          print("Done!")
          PYEOF
