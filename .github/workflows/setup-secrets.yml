name: Setup Secrets (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set all secrets via GitHub API
        run: |
          REPO="adrianenc11-hue/kelionai-v2"
          GH_TOKEN="REMOVED_TOKEN"

          # Get repo public key for secret encryption
          KEY_DATA=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")
          
          KEY_ID=$(echo "$KEY_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['key_id'])")
          PUB_KEY=$(echo "$KEY_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['key'])")
          
          echo "Key ID: $KEY_ID"

          # Function to encrypt and set a secret
          set_secret() {
            local name=$1
            local value=$2
            
            ENCRYPTED=$(python3 - <<PYEOF
import base64
from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PublicKey
from cryptography.hazmat.primitives import serialization
from cryptography.hazmat.backends import default_backend
import os

pub_key_bytes = base64.b64decode("$PUB_KEY")
pub_key = X25519PublicKey.from_public_bytes(pub_key_bytes)

# Generate ephemeral key pair
from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
private_key = X25519PrivateKey.generate()
shared_key = private_key.exchange(pub_key)

# Derive encryption key
import hashlib
key = hashlib.sha256(shared_key).digest()[:32]

# Encrypt using libsodium-compatible approach
from cryptography.hazmat.primitives.ciphers.aead import AESGCM
nonce = os.urandom(12)
aesgcm = AESGCM(key)
encrypted = aesgcm.encrypt(nonce, b"$value", None)

# Format: ephemeral_public_key + nonce + ciphertext
pub_bytes = private_key.public_key().public_bytes(
    serialization.Encoding.Raw, 
    serialization.PublicFormat.Raw
)
result = base64.b64encode(pub_bytes + nonce + encrypted).decode()
print(result)
PYEOF
)
            
            curl -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/secrets/$name" \
              -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}"
            
            echo "Set secret: $name"
          }

          pip install cryptography -q

          set_secret "RAILWAY_TOKEN" "d5c7c777-ef06-45b9-8c11-eb2a1b7e9367"
          set_secret "RAILWAY_PROJECT_ID" "b2a7f85e-7065-42c6-9922-82f5d2b01ebe"
          set_secret "RAILWAY_SERVICE_ID" "e983c608-8711-4f7e-8e97-774899602d44"

          echo "All secrets set!"
