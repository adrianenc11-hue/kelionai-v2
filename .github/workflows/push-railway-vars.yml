name: Push Vars to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  push-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Push all variables to Railway via GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          node scripts/push-vars-to-railway.js
          echo "✅ Variables pushed to Railway!"
