name: Diagnose + Fix

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  diagnose-and-fix:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Full diagnostic and deploy
        id: diag
        run: |
          mkdir -p logs
          LOG="logs/$(date +%Y%m%d-%H%M%S).txt"

          echo "=== railway whoami ===" | tee $LOG
          railway whoami 2>&1 | tee -a $LOG

          echo "" | tee -a $LOG
          echo "=== Projects ===" | tee -a $LOG
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { projects { edges { node { id name } } } } }"}' \
            | python3 -m json.tool 2>&1 | tee -a $LOG

          echo "" | tee -a $LOG
          echo "=== Service info ===" | tee -a $LOG
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ service(id: \\\"$RAILWAY_SERVICE_ID\\\") { id name source { repo branch } } }\"}" \
            | python3 -m json.tool 2>&1 | tee -a $LOG

          echo "" | tee -a $LOG
          echo "=== railway up ===" | tee -a $LOG
          railway up --detach 2>&1 | tee -a $LOG

          echo "" | tee -a $LOG
          echo "=== Health check ===" | tee -a $LOG
          sleep 30
          curl -s https://kelionai-v2-production.up.railway.app/health 2>&1 | tee -a $LOG

          echo "LOG=$LOG" >> $GITHUB_OUTPUT

      - name: Commit logs
        run: |
          git config user.email "ci@kelionai.app"
          git config user.name "KelionAI CI"
          git pull origin master --rebase
          git add logs/
          git diff --staged --quiet || git commit -m "ci: logs $(date +%Y%m%d-%H%M%S)"
          git push https://x-access-token:${{ github.token }}@github.com/adrianenc11-hue/kelionai-v2.git master
