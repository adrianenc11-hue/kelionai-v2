name: E2E Tests — kelionai.app

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright + browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests against live site
        run: npx playwright test --reporter=list,json
        env:
          BASE_URL: https://kelionai.app
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-json
          path: e2e-results.json
          retention-days: 7

      - name: Print test summary
        if: always()
        run: |
          echo "================================================"
          echo "E2E TEST RESULTS — kelionai.app"
          echo "================================================"
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('e2e-results.json')) { console.log('No results file found.'); process.exit(0); }
            const r = JSON.parse(fs.readFileSync('e2e-results.json','utf8'));
            const suites = r.suites || [];
            let passed=0, failed=0, skipped=0;
            const errors = [];
            function walk(suite) {
              for (const s of (suite.suites||[])) walk(s);
              for (const spec of (suite.specs||[])) {
                for (const t of (spec.tests||[])) {
                  const status = t.results?.[0]?.status;
                  if (status==='passed') passed++;
                  else if (status==='failed') {
                    failed++;
                    const err = t.results?.[0]?.error?.message || 'unknown error';
                    errors.push({ title: spec.title, error: err });
                  } else skipped++;
                }
              }
            }
            for (const s of suites) walk(s);
            console.log('PASSED : ' + passed);
            console.log('FAILED : ' + failed);
            console.log('SKIPPED: ' + skipped);
            console.log('TOTAL  : ' + (passed+failed+skipped));
            if (errors.length) {
              console.log('');
              console.log('ERRORS:');
              errors.forEach((e,i) => {
                console.log('');
                console.log('[' + (i+1) + '] ' + e.title);
                console.log('    ' + e.error.split('\n')[0]);
              });
            } else {
              console.log('');
              console.log('All tests passed!');
            }
          "
          echo "================================================"
