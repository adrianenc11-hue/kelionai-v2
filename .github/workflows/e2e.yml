name: E2E Tests — kelionai.app

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check site reachability
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://kelionai.app/health || echo "000")
          echo "Site status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Site returned $STATUS. Will still attempt tests."
          fi
        continue-on-error: true

      - name: Install Playwright
        run: |
          npm install --save-dev @playwright/test@1.44.0
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --reporter=list,json
        env:
          BASE_URL: https://kelionai.app
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-results.json
        continue-on-error: true

      - name: Commit results to repo
        if: always()
        run: |
          mkdir -p e2e-reports
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")

          # Save playwright output
          if [ -f e2e-results.json ]; then
            cp e2e-results.json e2e-reports/latest-results.json
          fi

          # Generate readable summary
          node -e "
            const fs = require('fs');
            const ts = new Date().toISOString();

            if (!fs.existsSync('e2e-results.json')) {
              const summary = {
                timestamp: ts,
                status: 'NO_RESULTS',
                note: 'Playwright did not generate output — site may be unreachable',
                passed: 0, failed: 0, total: 0, errors: []
              };
              fs.writeFileSync('e2e-reports/latest-summary.json', JSON.stringify(summary, null, 2));
              console.log(JSON.stringify(summary, null, 2));
              process.exit(0);
            }

            const r = JSON.parse(fs.readFileSync('e2e-results.json','utf8'));
            let passed=0, failed=0, skipped=0;
            const errors = [];

            function walk(suite, parentTitle) {
              const title = suite.title || parentTitle || '';
              for (const s of (suite.suites||[])) walk(s, title);
              for (const spec of (suite.specs||[])) {
                for (const t of (spec.tests||[])) {
                  const res = t.results?.[0];
                  if (res?.status==='passed') passed++;
                  else if (res?.status==='failed') {
                    failed++;
                    const errMsg = (res?.error?.message||'unknown')
                      .replace(/\x1b\[[0-9;]*m/g,'')
                      .split('\n').slice(0,5).join(' | ');
                    errors.push({ suite: title, test: spec.title, error: errMsg });
                  } else skipped++;
                }
              }
            }
            for (const s of (r.suites||[])) walk(s, '');

            const summary = { timestamp: ts, passed, failed, skipped, total: passed+failed+skipped, errors };
            fs.writeFileSync('e2e-reports/latest-summary.json', JSON.stringify(summary, null, 2));
            console.log(JSON.stringify(summary, null, 2));
          " || true

          git config user.email "e2e-bot@kelionai.app"
          git config user.name "E2E Bot"
          git add e2e-reports/
          git diff --cached --quiet || git commit -m "ci: E2E results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
