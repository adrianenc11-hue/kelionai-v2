name: Fix Now

on:
  push:
    branches: [master]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy Railway service
        run: |
          TOKEN="f2eb5a87-ed09-4ca6-bc07-956b9a307523"
          SERVICE_ID="e983c608-8711-4f7e-8e97-774899602d44"

          echo "=== Triggering redeploy ==="
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\") }\"}"

          echo ""
          echo "=== Health check in 30s ==="
          sleep 30
          curl -s https://kelionai-v2-production.up.railway.app/health
