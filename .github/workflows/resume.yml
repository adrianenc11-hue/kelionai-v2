name: RESUME NOW

on:
  push:
    branches: [master]

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Resume Render
        run: |
          KEY="rnd_1UglFqUPIGkaaFVQiL0RYQXy3PJg"
          
          echo "Getting services..."
          RESP=$(curl -s "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer $KEY")
          echo "$RESP"
          
          echo "$RESP" | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          svcs=data if isinstance(data,list) else data.get('services',[])
          for s in svcs:
            svc=s.get('service',s)
            print(svc.get('id',''))
          " | while read ID; do
            [ -z "$ID" ] && continue
            echo "Resuming $ID..."
            curl -s -X POST \
              "https://api.render.com/v1/services/$ID/resume" \
              -H "Authorization: Bearer $KEY"
            echo "Done $ID"
          done
