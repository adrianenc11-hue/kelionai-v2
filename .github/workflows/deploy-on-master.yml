name: deploy-on-master

on:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Build archived web bundle
        run: npm run build
      - name: Populate server/dist
        run: npm run build:server-dist
      - name: Install server dependencies
        run: npm --prefix server ci
      - name: Run server tests
        run: npm --prefix server test
      - name: Verify environment sanity (non-blocking)
        continue-on-error: true
        run: node server/scripts/verify-env.js

  deploy-placeholder:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - name: Next deploy steps
        run: |
          echo "Deployment placeholder job."
          echo "Configure actual deployment commands after secrets are set."
          echo "Required secrets:"
          echo " - RAILWAY_TOKEN (or AGENT_RAILWAY_TOKEN)"
          echo " - RAILWAY_PROJECT_ID"
          echo " - RAILWAY_SERVICE_ID"
          echo " - GITHUB_TOKEN (repo-scoped with minimum required permissions)"
