name: Setup & Deploy to Render

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  RENDER_API_KEY: rnd_1UglFqUPIGkaaFVQiL0RYQXy3PJg
  SERVICE_NAME: kelionai-v2

jobs:
  setup-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Render service and deploy
        run: node .github/scripts/render-setup.js
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
