name: Close Render

on:
  push:
    branches: [master]

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Find and suspend Render service
        run: |
          SERVICES=$(curl -s "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer rnd_1UglFqUPIGkaaFVQiL0RYQXy3PJg")
          
          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          svcs = data if isinstance(data,list) else data.get('services',[])
          for s in svcs:
            svc = s.get('service',s)
            print(svc.get('id',''))
            break
          ")
          
          echo "Suspending $SERVICE_ID..."
          curl -s -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/suspend" \
            -H "Authorization: Bearer rnd_1UglFqUPIGkaaFVQiL0RYQXy3PJg"
          echo "Render SUSPENDED"
