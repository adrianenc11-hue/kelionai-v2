name: Suspend Render

on:
  push:
    branches: [master]
  schedule:
    - cron: '*/10 * * * *'

jobs:
  suspend:
    runs-on: ubuntu-latest
    steps:
      - name: Suspend all Render services
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          [ -z "$RENDER_API_KEY" ] && echo "No RENDER_API_KEY set" && exit 0
          SERVICES=$(curl -s "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer $RENDER_API_KEY")
          echo "$SERVICES" | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          svcs=data if isinstance(data,list) else data.get('services',[])
          for s in svcs:
            svc=s.get('service',s)
            print(svc.get('id',''))
          " | while read ID; do
            [ -n "$ID" ] && curl -s -X POST \
              "https://api.render.com/v1/services/$ID/suspend" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              && echo "Suspended $ID"
          done
