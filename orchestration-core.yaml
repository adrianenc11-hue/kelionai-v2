    allowed_for:
      - 'text_to_speech'

  - id: 'tts_sonic'
    model: 'sonic-2'
    provider: 'Cartesia'
    role: 'text_to_speech_secondary'
    mandatory_usage: false
    skills:
      - 'text_to_speech'
      - 'fast_voice_generation'
    strengths:
      - 'fluidity'
    weaknesses:
      - 'secondary_role'
    tools:
      - 'audio_output'
    allowed_for:
      - 'text_to_speech'

  - id: 'tts_openai_fallback'
    model: 'tts-1-hd'
    provider: 'OpenAI'
    role: 'text_to_speech_fallback'
    mandatory_usage: false
    skills:
      - 'text_to_speech'
    strengths:
      - 'safe_fallback'
    weaknesses:
      - 'fallback_only'
    tools:
      - 'audio_output'
    allowed_for:
      - 'text_to_speech'

  - id: 'voice_realtime_gpt4o'
    model: 'gpt-4o-realtime-preview'
    provider: 'OpenAI'
    role: 'realtime_voice_agent'
    mandatory_usage: false
    skills:
      - 'voice_to_voice'
      - 'low_latency_live_dialogue'
    strengths:
      - 'real_time_conversation'
    weaknesses:
      - 'specialized_channel_only'
    tools:
      - 'live_audio_stream'
    allowed_for:
