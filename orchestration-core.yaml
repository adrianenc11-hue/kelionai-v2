version: '1.0'
name: 'KelionAI Master Orchestration Core'
mode: 'mandatory'
owner: 'KelionAI'
description: >
  This is the single authoritative orchestration program for all AI agents
  inside KelionAI. Every model, router, worker, reviewer, multimodal agent,
  voice agent, and fallback path must comply with this program.
  No agent may bypass these rules.

global_principles:
  - 'Never invent capabilities that are not declared.'
  - 'Never choose a specialist without matching task requirements to declared skills.'
  - 'Prefer the cheapest valid path for low-risk tasks.'
  - 'Prefer the most reliable path for high-risk or high-complexity tasks.'
  - 'Validation is required for critical outputs whenever tools are available.'
  - 'Web retrieval is never the final reasoning layer.'
  - 'A worker may generate, but a judge decides completion.'
  - 'Final completion requires acceptance criteria.'
  - 'If no meaningful progress is possible, stop honestly.'
  - 'If policy or safety boundaries are reached, stop immediately.'

task_taxonomy:
  categories:
    - 'chat_simple'
    - 'chat_general'
    - 'coding'
    - 'debugging'
    - 'architecture'
    - 'math_logic'
    - 'web_search'
    - 'document_analysis'
    - 'vision_analysis'
    - 'image_generation'
    - 'speech_to_text'
    - 'text_to_speech'
    - 'voice_realtime'
    - 'multimodal'
    - 'qa_review'
    - 'fallback_execution'

complexity_levels:
  - 'low'
  - 'medium'
  - 'high'
  - 'critical'

risk_levels:
  - 'low'
  - 'medium'
  - 'high'
  - 'critical'

budget_modes:
  - 'economy'
  - 'normal'
  - 'premium'
  - 'over_budget'

agents:
  - id: 'front_scout'
    model: 'meta-llama/llama-4-scout-17b-16e-instruct'
    provider: 'Groq'
    role: 'front_controller'
    mandatory_usage: true
    skills:
      - 'fast_chat'
      - 'intent_classification'
      - 'quick_routing'
      - 'light_reasoning'
      - 'ux_latency_optimization'
    strengths:
      - 'ultra_fast'
      - 'cheap'
      - 'high_throughput'
    weaknesses:
      - 'not_for_deep_final_judgment'
      - 'not_for_critical_architecture_decisions'
    tools:
      - 'session_memory'
    allowed_for:
      - 'chat_simple'
      - 'chat_general'
      - 'light_triage'
    blocked_for:
      - 'critical_final_judgment'
      - 'high_risk_code_release'

  - id: 'fallback_llama70b'
    model: 'llama-3.3-70b-versatile'
    provider: 'Groq'
    role: 'budget_fallback'
    mandatory_usage: false
    skills:
      - 'general_generation'
      - 'fallback_chat'
      - 'secondary_processing'
    strengths:
      - 'cheaper_than_premium_models'
      - 'strong_general_use'
    weaknesses:
      - 'not_preferred_for_critical_tasks'
    tools:
      - 'session_memory'
    allowed_for:
      - 'fallback_execution'
      - 'chat_general'
      - 'non_critical_secondary_tasks'

  - id: 'orchestrator_gpt54'
    model: 'gpt-5.4'
    provider: 'OpenAI'
    role: 'strategic_orchestrator'
    mandatory_usage: true
    skills:
      - 'planning'
      - 'routing'
      - 'complex_reasoning'
      - 'final_judgment'
      - 'high_complexity_code'
      - 'cross_agent_synthesis'
    strengths:
      - 'best_strategic_decisions'
      - 'strong_multi_step_reasoning'
      - 'best_final_judge'
    weaknesses:
      - 'high_cost'
      - 'higher_latency'
    tools:
      - 'agent_registry'
      - 'job_state'
      - 'validator_reports'
      - 'multi_agent_memory'
    allowed_for:
      - 'high_complexity_tasks'
      - 'multi_agent_orchestration'
      - 'critical_final_judgment'
      - 'architecture'
      - 'conflict_resolution'

  - id: 'coder_claude'
    model: 'claude-sonnet-4-20250514'
    provider: 'Anthropic'
    role: 'code_engineer'
    mandatory_usage: false
    skills:
      - 'coding'
      - 'refactor'
      - 'repo_analysis'
      - 'long_context_reasoning'
      - 'spec_to_code'
      - 'code_review'
    strengths:
      - 'excellent_code_quality'
      - 'good_large_repo_reasoning'
    weaknesses:
      - 'not_primary_live_router'
    tools:
      - 'repo_search'
      - 'file_edit'
      - 'test_runner'
      - 'lint'
      - 'type_check'
    allowed_for:
      - 'coding'
      - 'debugging'
      - 'architecture_support'
      - 'qa_review'

  - id: 'reasoner_deepseek'
    model: 'deepseek-reasoner'
    provider: 'DeepSeek'
    role: 'logic_specialist'
    mandatory_usage: false
    skills:
      - 'math'
      - 'algorithms'
      - 'formal_logic'
      - 'hard_debugging'
      - 'deep_reasoning'
    strengths:
      - 'very_strong_logic'
      - 'strong_algorithmic_analysis'
    weaknesses:
      - 'not_best_user_facing_writer'
    tools:
      - 'repo_search'
      - 'scratchpad'
      - 'test_runner'
    allowed_for:
      - 'math_logic'
      - 'debugging'
      - 'coding'

  - id: 'coder_deepseek'
    model: 'deepseek-coder'
    provider: 'DeepSeek'
    role: 'code_specialist'
    mandatory_usage: false
    skills:
      - 'coding'
      - 'backend_logic'
      - 'bug_fixing'
      - 'algorithm_implementation'
    strengths:
      - 'strong_programming_focus'
    weaknesses:
      - 'needs_review_for_polish'
    tools:
      - 'repo_search'
      - 'file_edit'
      - 'test_runner'
      - 'lint'
    allowed_for:
      - 'coding'
      - 'debugging'

  - id: 'qa_gemini_flash'
    model: 'gemini-2.5-flash'
    provider: 'Google'
    role: 'fast_quality_gate'
    mandatory_usage: false
    skills:
      - 'fast_review'
      - 'bulk_summary'
      - 'quick_multimodal_triage'
    strengths:
      - 'speed'
      - 'high_volume_review'
    weaknesses:
      - 'not_primary_final_judge_for_critical_code'
    tools:
      - 'document_reader'
      - 'validator_reports'
    allowed_for:
      - 'qa_review'
      - 'document_analysis'
      - 'multimodal'

  - id: 'qa_gemini_pro'
    model: 'gemini-2.5-pro'
    provider: 'Google'
    role: 'deep_quality_gate'
    mandatory_usage: false
    skills:
      - 'deep_qa'
      - 'cross_checking'
      - 'multimodal_review'
      - 'report_generation'
    strengths:
      - 'strong_second_opinion'
      - 'good_multimodal_evaluation'
    weaknesses:
      - 'higher_cost_than_flash'
    tools:
      - 'document_reader'
      - 'validator_reports'
    allowed_for:
      - 'qa_review'
      - 'multimodal'
      - 'critical_secondary_review'

  - id: 'web_sonar'
    model: 'sonar-pro'
    provider: 'Perplexity'
    role: 'web_search_agent'
    mandatory_usage: true
    skills:
      - 'real_time_web_search'
      - 'source_collection'
      - 'fact_source_retrieval'
    strengths:
      - 'live_internet_access'
    weaknesses:
      - 'not_final_answer_agent'
      - 'not_final_reasoning_authority'
    tools:
      - 'web_search'
    allowed_for:
      - 'web_search'

  - id: 'vision_gpt54'
    model: 'gpt-5.4'
    provider: 'OpenAI'
    role: 'vision_agent'
    mandatory_usage: false
    skills:
      - 'image_analysis'
      - 'complex_visual_reasoning'
      - 'visual_extraction'
    strengths:
      - 'high_quality_visual_understanding'
    weaknesses:
      - 'cost'
    tools:
      - 'image_input'
    allowed_for:
      - 'vision_analysis'
      - 'multimodal'

  - id: 'vision_gemini'
    model: 'gemini-2.5-flash'
    provider: 'Google'
    role: 'document_multimodal_agent'
    mandatory_usage: false
    skills:
      - 'pdf_reading'
      - 'document_understanding'
      - 'video_audio_image_mixed_input'
    strengths:
      - 'good_document_throughput'
      - 'good_multimodal_scaling'
    weaknesses:
      - 'not_default_final_judge'
    tools:
      - 'pdf_input'
      - 'multimodal_input'
    allowed_for:
