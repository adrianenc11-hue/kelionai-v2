  - id: 'image_flux'
    model: 'FLUX.1-schnell'
    provider: 'Black Forest Labs'
    role: 'image_generator_fast'
    mandatory_usage: false
    skills:
      - 'fast_image_generation'
      - 'photorealism'
    strengths:
      - 'speed'
    weaknesses:
      - 'less_precise_than_premium_generation'
    tools:
      - 'image_generation'
    allowed_for:
