routing_rules:
  mandatory_order:
    - 'classify'
    - 'estimate_complexity'
    - 'estimate_risk'
    - 'estimate_budget_mode'
    - 'detect_modality'
    - 'choose_agents'
    - 'build_plan'
    - 'execute'
    - 'validate'
    - 'judge'
    - 'finalize'

  default_entry_agent: 'front_scout'

  route_logic:
    - when: "task.category == 'chat_simple' and task.complexity == 'low' and task.risk == 'low'"
      use: ['front_scout']

    - when: "task.category == 'chat_general' and task.complexity in ['low','medium'] and task.risk in ['low','medium']"
      use: ['front_scout']

    - when: "task.category == 'coding' and task.complexity in ['low','medium']"
      use: ['coder_claude']

    - when: "task.category in ['coding','debugging'] and task.tags contains_any ['algorithm','formal_logic','hard_bug','math_heavy']"
      use: ['reasoner_deepseek']

    - when: "task.category == 'architecture' or task.complexity in ['high','critical'] or task.multi_agent == true"
      use: ['orchestrator_gpt54']

    - when: "task.category == 'web_search' or task.requires_live_data == true"
      use: ['web_sonar', 'orchestrator_gpt54']

    - when: "task.category == 'document_analysis'"
      use: ['vision_gemini']

    - when: "task.category == 'vision_analysis'"
      use: ['vision_gpt54']

    - when: "task.category == 'image_generation' and task.quality_mode != 'premium'"
      use: ['image_flux']

    - when: "task.category == 'image_generation' and task.quality_mode == 'premium'"
      use: ['image_dalle3']

    - when: "task.category == 'speech_to_text'"
      use: ['stt_whisper']

    - when: "task.category == 'text_to_speech'"
      use: ['tts_eleven']

    - when: "task.category == 'voice_realtime'"
      use: ['voice_realtime_gpt4o']

    - when: "task.budget_mode == 'over_budget' and task.risk in ['low','medium'] and task.category not in ['critical_final_judgment','architecture']"
      use: ['fallback_llama70b']

escalation_rules:
  - condition: 'worker_failed == true'
    action: 'select_fallback_agent_with_same_or_better_skill'

  - condition: 'output_confidence < threshold'
    action: 'escalate_to_orchestrator_gpt54'

  - condition: "task.risk in ['high','critical']"
    action: 'require_secondary_review'

  - condition: "task.category == 'coding' and task.complexity in ['high','critical']"
    action: 'require_validation_and_review'

  - condition: 'answers_conflict == true'
    action: 'orchestrator_gpt54_resolves_conflict'

  - condition: 'web_search_used == true'
    action: 'web_sources_must_be_synthesized_by_non_search_agent'

execution_rules:
  - 'No agent may mark a task complete without acceptance criteria.'
  - 'No worker output is final unless judged.'
  - 'For coding tasks, use available repo tools before answering.'
  - 'For critical code, tests or validation are mandatory if available.'
  - 'For live web questions, source retrieval must happen before final answer.'
  - 'For multimodal tasks, the relevant vision/document agent must process input first.'
  - 'For voice tasks, STT/TTS selection follows route rules and fallback chain.'
  - 'A model may not self-assign capabilities not present in registry.'
  - 'A model may not bypass cost policy.'
  - 'A model may not bypass review on critical tasks.'

validation_policy:
  coding:
    required_if_available:
      - 'test_runner'
      - 'lint'
      - 'type_check'
    minimum_requirements:
      - 'implementation_matches_request'
      - 'no_unresolved_critical_errors'
      - 'validation_attempted'
    high_risk_requirements:
      - 'secondary_review_required'
      - 'final_judge_required'

  web_search:
    required_if_available:
      - 'source_collection'
    minimum_requirements:
      - 'live_sources_retrieved'
      - 'final_answer_written_by_non_search_agent'

  document_analysis:
    minimum_requirements:
      - 'document_processed_by_document_agent'
      - 'summary_checked_for_completeness'

  vision_analysis:
    minimum_requirements:
      - 'image_processed_by_vision_agent'
      - 'extracted_details_checked'

  image_generation:
    minimum_requirements:
      - 'prompt_alignment_checked'

  voice:
    minimum_requirements:
      - 'channel_specific_agent_used'

quality_gate_policy:
  use_fast_gate_when:
    - 'task.volume_is_large'
    - 'task.risk_is_not_critical'
    - 'quick_review_needed'

  use_deep_gate_when:
    - "task.risk in ['high','critical']"
    - 'task.is_multimodal_complex == true'
    - 'task.output_will_be_final_user_facing_high_value == true'

  fast_gate_agent: 'qa_gemini_flash'
  deep_gate_agent: 'qa_gemini_pro'

final_judgment_policy:
  primary_final_judge: 'orchestrator_gpt54'
  rule:
    - 'Critical tasks require GPT-5.4 final judgment.'
    - 'Non-critical low-risk tasks may complete without GPT-5.4 if route rules allow.'
    - 'No search agent can be final judge.'
    - 'No fallback budget model can be final judge for critical work.'

stop_conditions:
  success:
    - 'all_acceptance_criteria_met'
    - 'required_validations_passed_or_attempted'
    - 'no_unresolved_critical_findings'
    - 'final_judge_approved'

  honest_stop:
    - 'no_meaningful_progress_possible'
    - 'missing_required_tools'
    - 'missing_required_input'
    - 'safety_or_policy_boundary_reached'

fallback_chain:
  chat:
    primary: 'front_scout'
    secondary: 'fallback_llama70b'
    tertiary: 'orchestrator_gpt54'

  coding:
    primary: 'coder_claude'
    secondary: 'coder_deepseek'
    tertiary: 'orchestrator_gpt54'

  logic:
    primary: 'reasoner_deepseek'
    secondary: 'orchestrator_gpt54'

  web:
    primary: 'web_sonar'
    secondary: 'orchestrator_gpt54'

  vision:
    primary: 'vision_gpt54'
    secondary: 'vision_gemini'

  document:
    primary: 'vision_gemini'
    secondary: 'vision_gpt54'

  image_generation:
    primary: 'image_flux'
    secondary: 'image_dalle3'

  stt:
    primary: 'stt_whisper'
    secondary: 'stt_nova3'

  tts:
    primary: 'tts_eleven'
    secondary: 'tts_sonic'
    tertiary: 'tts_openai_fallback'

response_contract:
  mandatory_output_schema:
    type: 'object'
    required:
      - 'job_id'
      - 'task_category'
      - 'complexity'
      - 'risk'
      - 'budget_mode'
      - 'selected_agents'
      - 'plan'
      - 'acceptance_criteria'
      - 'validation_results'
      - 'final_status'
      - 'final_judge'
    properties:
      job_id:
        type: 'string'
      task_category:
        type: 'string'
      complexity:
        type: 'string'
      risk:
        type: 'string'
      budget_mode:
        type: 'string'
      selected_agents:
        type: 'array'
      plan:
        type: 'array'
      acceptance_criteria:
        type: 'array'
      validation_results:
        type: 'array'
      final_status:
        type: 'string'
      final_judge:
        type: 'string'

worker_contract:
  each_worker_must_return:
    - 'task_interpreted'
    - 'work_done'
    - 'limitations'
    - 'confidence'
    - 'needs_review'
    - 'needs_tools'
    - 'proposed_next_step'

judge_contract:
  final_judge_must_decide:
    - 'approve'
    - 'reject'
    - 'replan'
    - 'fallback'
    - 'stop_honestly'

mandatory_prohibitions:
  - 'Do not fabricate facts.'
  - 'Do not fabricate tool outputs.'
  - 'Do not mark completion without criteria.'
  - 'Do not bypass review on critical tasks.'
  - 'Do not present web retrieval as final reasoning.'
  - 'Do not override registry with imagined capabilities.'
  - 'Do not ignore budget mode.'
  - 'Do not conceal inability to complete.'

system_roles:
  front_controller:
    duties:
      - 'receive request'
      - 'triage quickly'
      - 'respond directly only if simple'
      - 'escalate when needed'

  strategic_orchestrator:
    duties:
      - 'build plan'
      - 'choose agents'
      - 'merge outputs'
      - 'manage fallbacks'
      - 'trigger validation'
      - 'make final critical decisions'

  worker:
    duties:
      - 'do assigned task only'
      - 'do not self-promote to final judge'
      - 'report uncertainty'

  reviewer:
    duties:
      - 'identify flaws'
      - 'report critical findings'
      - 'never hide uncertainty'

example_acceptance_criteria:
  coding:
    - 'feature_or_fix_implemented'
    - 'tests_or_validation_run_if_available'
    - 'no_critical_review_findings'
    - 'final_response_clear'

  web_search:
    - 'live_sources_retrieved'
    - 'answer_synthesized'
    - 'important_claims_grounded'

  document_analysis:
    - 'document_read'
    - 'key_points_extracted'
    - 'uncertainties_stated'

  live_chat:
    - 'response_fast'
    - 'response_relevant'
    - 'escalation_used_when_needed'

enforcement_note: >
  This program is mandatory, but prompt-only compliance is not sufficient.
  Backend enforcement must validate routing decisions, output schema,
  critical review requirements, and validation steps.
