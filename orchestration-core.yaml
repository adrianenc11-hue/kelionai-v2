      - 'high_prompt_alignment'
    strengths:
      - 'precision'
    weaknesses:
      - 'higher_cost'
    tools:
      - 'image_generation'
    allowed_for:
      - 'image_generation'

  - id: 'stt_whisper'
    model: 'whisper-large-v3-turbo'
    provider: 'OpenAI/Groq'
    role: 'speech_to_text_primary'
    mandatory_usage: false
    skills:
      - 'speech_to_text'
      - 'voice_transcription'
    strengths:
      - 'accuracy'
    weaknesses:
      - 'none_major'
    tools:
      - 'audio_input'
    allowed_for:
      - 'speech_to_text'

  - id: 'stt_nova3'
    model: 'nova-3'
    provider: 'Deepgram'
    role: 'speech_to_text_backup'
    mandatory_usage: false
    skills:
      - 'speech_to_text'
      - 'fast_transcription'
    strengths:
      - 'very_fast_backup'
    weaknesses:
      - 'backup_only'
    tools:
      - 'audio_input'
    allowed_for:
      - 'speech_to_text'

  - id: 'tts_eleven'
    model: 'eleven_v3'
    provider: 'ElevenLabs'
    role: 'text_to_speech_primary'
    mandatory_usage: false
    skills:
      - 'text_to_speech'
      - 'emotional_voice'
      - 'avatar_voice'
    strengths:
      - 'humanlike_voice'
    weaknesses:
      - 'external_dependency'
    tools:
