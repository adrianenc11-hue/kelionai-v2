[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake", "poppler_utils", "tesseract", "ffmpeg", "jq", "chromium", "nss", "at-spi2-atk", "cups", "libdrm", "mesa", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXrandr", "alsa-lib", "pango", "cairo", "gtk3", "glib", "dbus"]

[phases.install]
cmds = [
  "npm install",
  "PUPPETEER_SKIP_DOWNLOAD=1 npm install --prefix server --omit=dev"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/src/index.js"
