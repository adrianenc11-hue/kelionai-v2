services:
  - type: web
    name: kelionai-v2
    runtime: node
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: "production"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: DB_PATH
        value: "/data/kelion.db"
    buildCommand: npm install && npm run build && cd server && npm install --omit=dev
    startCommand: node server/src/index.js
    disk:
      name: kelionai-db
      mountPath: /data
      sizeGB: 1

